name: Clean old GitHub Packages

on:
  schedule:
    - cron: '0 2 * * *'    
  workflow_dispatch:      

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      packages: write     

    steps:
      - name: Delete old package versions (keep latest 3)
        uses: actions/delete-package-versions@v5
        with:
          package-type: 'container'
          package-name: 'thinkphp'
          min-versions-to-keep: 3 
